<body>
    <h1>Send a Message</h1>
    <a href="index.html" target="_blank">Go back home</a>


    <form>

        <!-- Full Name -->
        <label for="name">Full Name</label>
        <input type="name" id="name" placeholder="e.g Jordan Smith">
        <br><br><br>

        <!-- Email Address -->
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="e.g jordan@gmail.com">
        <br><br><br>

        <!-- Phone Number  -->
        <label for="number">Phone Number</label>
        <input type="number" id="number" placeholder="e.g 07000009900">
        <br><br><br>

                <!-- Subject -->

        <label>Subject</label>

        <select name="Subject"> 
            <option>___Please Select___</option>
            <option>Freelance Project</option>
            <option>Collaboration</option>
            <option>Job opportunity</option>
            <option>General Enquiry</option>
        </select>

        <br><br><br>

        <!-- Message -->

        <label>Message</label>
        <textarea placeholder="Tell me about your project....."></textarea> 
        
        <br><br><br>

            <!--Send Message -->
        <button>Send Message</button>


    </form>
